name: Build on Windows

on:
  push:
    branches:
      - master
      - windows
      - win-meson-debug
      - win-meson-nopatch
    paths:
      #- "recipe/*"
      - "recipe_win/*"
      - ".github/workflows/windows.yml"

jobs:
  build-win-64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v2
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: mokit-env
          environment-file: recipe_win/env.yaml
          python-version: 3.11
      - name: Build the package
        run: |
          set -euo pipefail
          conda info
          #source "${CONDA}/etc/profile.d/conda.sh"
          conda activate mokit-env
          rev="$(
            python - <<'PY'
            import re
            from pathlib import Path

            p = Path('recipe_win/recipe.yaml')
            m = re.search(r'^\s*rev:\s*(\S+)\s*$', p.read_text(encoding='utf-8'), flags=re.M)
            if not m:
                raise SystemExit('Could not find source rev in recipe_win/recipe.yaml')
            print(m.group(1))
            PY
          )"
          curl -fsSL "https://gitlab.com/jxzou/mokit/-/raw/${rev}/pyproject.toml" -o pyproject.toml
          rattler-build build --recipe recipe_win --output-dir output -c conda-forge --experimental
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mokit-win-64
          path: output/*/*.conda
      - name: Upload to Anaconda.org
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA }}
        run: |
          set -euo pipefail
          #source "${CONDA}/etc/profile.d/conda.sh"
          conda activate mokit-env
          shopt -s globstar nullglob
          packages=(output/**/*.conda)
          if (( ${#packages[@]} == 0 )); then
            echo "No .conda packages found under output/" >&2
            exit 1
          fi
          for pkg in "${packages[@]}"; do
            rattler-build upload anaconda -o mokit "$pkg"
          done
