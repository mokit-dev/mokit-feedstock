name: Build on Windows

on:
  push:
    branches:
      - master
      - windows
      - win-meson-debug
      - win-meson-nopatch
    paths:
      #- "recipe/*"
      - "recipe_win/*"
      - ".github/workflows/windows.yml"

jobs:
  build-win-64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v2
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: mokit-env
          environment-file: recipe_win/env.yaml
          python-version: 3.11
      - name: Build the package
        run: |
          set -euo pipefail
          conda info
          # setup-miniconda provides conda activation in the shell
          conda activate mokit-env
          rev="$(
            awk '
              /^[[:space:]]*rev:[[:space:]]*/ {
                sub(/^[[:space:]]*rev:[[:space:]]*/, "")
                split($0, a, /[[:space:]]+/)
                print a[1]
                exit
              }
            ' recipe_win/recipe.yaml
          )"
          if [[ -z "${rev}" ]]; then
            echo "Could not find source rev in recipe_win/recipe.yaml" >&2
            exit 1
          fi
          curl -fsSL "https://gitlab.com/jxzou/mokit/-/raw/${rev}/pyproject.toml" -o pyproject.toml
          rattler-build build --recipe recipe_win --output-dir output -c conda-forge --experimental
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mokit-win-64
          path: output/*/*.conda
      - name: Upload to Anaconda.org
        env:
          ANACONDA_API_KEY: ${{ secrets.ANACONDA }}
        run: |
          set -euo pipefail
          # setup-miniconda provides conda activation in the shell
          conda activate mokit-env
          shopt -s globstar nullglob
          packages=(output/**/*.conda)
          if (( ${#packages[@]} == 0 )); then
            echo "No .conda packages found under output/" >&2
            exit 1
          fi
          for pkg in "${packages[@]}"; do
            rattler-build upload anaconda -o mokit "$pkg"
          done
